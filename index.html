<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClipShare</title>
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155;
      --text: #e2e8f0; --dim: #94a3b8; --accent: #38bdf8;
      --green: #22c55e; --red: #ef4444; --orange: #f59e0b;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
    }

    /* Login */
    .login-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; gap: 20px;
    }
    .login-screen h1 { font-size: 2rem; color: var(--accent); }
    .login-screen input {
      padding: 12px 20px; font-size: 1.2rem; border-radius: 8px;
      border: 2px solid var(--border); background: var(--surface); color: var(--text);
      text-align: center; width: 240px; letter-spacing: 4px;
    }
    .login-screen input:focus { outline: none; border-color: var(--accent); }
    .login-screen button {
      padding: 12px 40px; font-size: 1rem; border-radius: 8px;
      border: none; background: var(--accent); color: #000; cursor: pointer;
      font-weight: 600;
    }
    .login-screen button:hover { opacity: 0.9; }
    .login-error { color: var(--red); font-size: 0.9rem; }

    /* App */
    .app { display: none; max-width: 800px; margin: 0 auto; padding: 16px; }
    .app.visible { display: block; }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 16px;
    }
    .header h1 { font-size: 1.3rem; color: var(--accent); }
    .header .status { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--dim); }
    .header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
    .header .dot.off { background: var(--red); }

    /* Input area */
    .input-area {
      background: var(--surface); border-radius: 12px; padding: 16px;
      margin-bottom: 16px; border: 1px solid var(--border);
    }
    .input-area textarea {
      width: 100%; background: transparent; border: none; color: var(--text);
      font-size: 1rem; resize: vertical; min-height: 80px; font-family: inherit;
    }
    .input-area textarea:focus { outline: none; }
    .input-area textarea::placeholder { color: var(--dim); }
    .input-actions {
      display: flex; gap: 8px; margin-top: 12px; align-items: center;
    }
    .btn {
      padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); cursor: pointer;
      font-size: 0.85rem; display: flex; align-items: center; gap: 6px;
    }
    .btn:hover { border-color: var(--accent); }
    .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
    .btn.primary:hover { opacity: 0.9; }
    .btn.danger { border-color: var(--red); color: var(--red); }
    .btn.danger:hover { background: var(--red); color: #fff; }

    .file-input { display: none; }
    .spacer { flex: 1; }

    /* Staged files preview */
    .staged-files {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;
      padding-top: 10px; border-top: 1px solid var(--border);
    }
    .staged-files:empty { display: none; }
    .staged-file {
      position: relative; border-radius: 8px; border: 1px solid var(--border);
      overflow: hidden; background: var(--bg);
    }
    .staged-file img {
      width: 80px; height: 80px; object-fit: cover; display: block;
    }
    .staged-file .sf-name {
      font-size: 0.7rem; color: var(--dim); padding: 4px 6px;
      max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .staged-file .sf-remove {
      position: absolute; top: 2px; right: 2px; width: 18px; height: 18px;
      border-radius: 50%; background: rgba(0,0,0,0.7); color: var(--red);
      border: none; cursor: pointer; font-size: 12px; line-height: 18px;
      text-align: center; padding: 0;
    }
    .staged-file .sf-remove:hover { background: var(--red); color: #fff; }
    .staged-count {
      font-size: 0.8rem; color: var(--accent); margin-left: 4px;
    }

    /* Clips */
    .clips { display: flex; flex-direction: column; gap: 8px; }
    .clip {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px; position: relative; transition: border-color 0.2s;
    }
    .clip:hover { border-color: var(--accent); }
    .clip-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
      font-size: 0.75rem; color: var(--dim);
    }
    .clip-type {
      padding: 2px 8px; border-radius: 4px; font-weight: 600; font-size: 0.7rem;
      text-transform: uppercase;
    }
    .clip-type.text { background: #1e3a5f; color: var(--accent); }
    .clip-type.url { background: #1a3a2a; color: var(--green); }
    .clip-type.image { background: #3a2a1a; color: var(--orange); }
    .clip-type.video { background: #3a1a2a; color: #f472b6; }
    .clip-type.file { background: #2a2a3a; color: #a78bfa; }
    .clip-type.composite { background: #2a3a3a; color: #5eead4; }

    .clip-attachments {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;
    }
    .clip-attachments img {
      max-width: 100%; max-height: 300px; border-radius: 8px; cursor: pointer;
    }
    .clip-attachments video {
      max-width: 100%; max-height: 300px; border-radius: 8px;
    }
    .clip-attachments .att-file {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 12px; border-radius: 6px; background: var(--bg);
      border: 1px solid var(--border); font-size: 0.85rem;
    }
    .clip-attachments .att-file a { color: var(--accent); text-decoration: none; }
    .clip-attachments .att-file a:hover { text-decoration: underline; }

    .clip-content {
      font-size: 0.95rem; line-height: 1.5; word-break: break-all;
      max-height: 200px; overflow-y: auto;
    }
    .clip-content pre {
      white-space: pre-wrap; font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.85rem;
    }
    .clip-content a { color: var(--accent); text-decoration: none; }
    .clip-content a:hover { text-decoration: underline; }
    .clip-content img {
      max-width: 100%; max-height: 300px; border-radius: 8px; margin-top: 4px;
    }
    .clip-content video {
      max-width: 100%; max-height: 300px; border-radius: 8px; margin-top: 4px;
    }

    .clip-actions {
      position: absolute; top: 10px; right: 10px;
      display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s;
    }
    .clip:hover .clip-actions { opacity: 1; }
    .clip-btn {
      padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--bg); color: var(--dim); cursor: pointer; font-size: 0.75rem;
    }
    .clip-btn:hover { color: var(--text); border-color: var(--accent); }
    .clip-btn.del:hover { color: var(--red); border-color: var(--red); }

    /* Label */
    .clip-label {
      display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
    }
    .clip-label-text {
      font-size: 0.85rem; font-weight: 600; color: var(--accent);
      cursor: pointer; padding: 2px 6px; border-radius: 4px;
      border: 1px solid transparent; max-width: 90%;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .clip-label-text:hover { border-color: var(--border); }
    .clip-label-text.empty {
      color: var(--dim); font-weight: 400; font-style: italic;
    }
    .clip-label-input {
      font-size: 0.85rem; font-weight: 600; color: var(--accent);
      padding: 2px 6px; border-radius: 4px; width: 90%;
      border: 1px solid var(--accent); background: var(--bg);
      font-family: inherit; outline: none;
    }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--green); color: #000; padding: 10px 24px; border-radius: 8px;
      font-weight: 600; font-size: 0.9rem; opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    .empty {
      text-align: center; padding: 60px 20px; color: var(--dim);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }

    @media (max-width: 600px) {
      .app { padding: 10px; }
      .input-area textarea { min-height: 60px; }
    }
  </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <h1>&#128203; ClipShare</h1>
  <p style="color: var(--dim)">Enter PIN to connect</p>
  <input type="password" id="pinInput" placeholder="PIN" maxlength="20" autofocus>
  <button onclick="login()">Connect</button>
  <div class="login-error" id="loginError"></div>
</div>

<!-- App -->
<div class="app" id="app">
  <div class="header">
    <h1>&#128203; ClipShare</h1>
    <div class="status">
      <span class="dot" id="wsDot"></span>
      <span id="wsLabel">Connected</span>
      <button class="clip-btn" onclick="loadClips()" title="Refresh" style="margin-left:8px;font-size:0.9rem;padding:3px 8px;">&#128260;</button>
      <span style="margin-left:4px" id="deviceLabel"></span>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="clipLabel" placeholder="Label (optional) — e.g. 'API docs for GLM'"
      style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--border);
      color:var(--accent); font-size:0.9rem; padding:6px 0; margin-bottom:8px; font-family:inherit; outline:none;"
    >
    <textarea id="clipInput" placeholder="Paste text, URL, or anything here... (Ctrl+V)"></textarea>
    <div class="staged-files" id="stagedFiles"></div>
    <div class="input-actions">
      <button class="btn primary" onclick="sendComposite()">&#128228; Send</button>
      <button class="btn" onclick="fileInput.click()">&#128206; Attach<span class="staged-count" id="stagedCount"></span></button>
      <input type="file" class="file-input" id="fileInput" onchange="stageFiles(this)" multiple>
      <span class="spacer"></span>
      <button class="btn danger" onclick="clearAll()">&#128465; Clear All</button>
    </div>
  </div>

  <div class="clips" id="clips"></div>
  <div class="empty" id="emptyState">
    <div class="empty-icon">&#128203;</div>
    <p>No clips yet. Paste something or upload a file.</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = location.origin;
  let TOKEN = localStorage.getItem('clipshare_token') || '';
  let ws = null;
  let clips = [];
  let wsRetryDelay = 1000;   // Exponential backoff for WS reconnection
  let pollInterval = null;   // Fallback polling when WS is down
  const DEVICE = navigator.userAgent.includes('Windows') ? 'Windows' :
                 navigator.userAgent.includes('Mac') ? 'Mac' :
                 navigator.userAgent.includes('Linux') ? 'Linux' : 'Device';

  // ---- Auth ----
  async function login() {
    const pin = document.getElementById('pinInput').value;
    if (!pin) return;
    try {
      const res = await fetch(`${API}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin }),
      });
      if (!res.ok) {
        document.getElementById('loginError').textContent = 'PIN incorrecto';
        return;
      }
      const { token } = await res.json();
      TOKEN = token;
      localStorage.setItem('clipshare_token', token);
      showApp();
    } catch (e) {
      document.getElementById('loginError').textContent = 'Connection error';
    }
  }

  document.getElementById('pinInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  // ---- App ----
  async function showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('deviceLabel').textContent = DEVICE;
    await loadClips();
    connectWS();
  }

  async function loadClips(retries = 2) {
    try {
      const res = await fetch(`${API}/api/clipboard`, {
        headers: { 'x-token': TOKEN },
      });
      if (res.status === 401) return logout();
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      clips = await res.json();
      render();
    } catch (e) {
      console.warn('[ClipShare] loadClips failed:', e.message);
      if (retries > 0) {
        setTimeout(() => loadClips(retries - 1), 2000);
      } else {
        toast('Connection lost — tap 🔄 to retry');
      }
    }
  }

  function connectWS() {
    if (ws) { try { ws.close(); } catch {} }
    try {
      ws = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}?token=${TOKEN}`);
    } catch (e) {
      console.warn('[ClipShare] WS create failed:', e);
      scheduleReconnect();
      return;
    }
    ws.onopen = () => {
      wsRetryDelay = 1000; // Reset backoff on success
      document.getElementById('wsDot').className = 'dot';
      document.getElementById('wsLabel').textContent = 'Live';
      // Stop fallback polling when WS is connected
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
      // Refresh clips in case we missed events while disconnected
      loadClips();
    };
    ws.onclose = () => {
      document.getElementById('wsDot').className = 'dot off';
      document.getElementById('wsLabel').textContent = 'Offline — retrying...';
      scheduleReconnect();
      // Start fallback polling (every 10s) so clips still sync without WS
      if (!pollInterval) {
        pollInterval = setInterval(() => { if (TOKEN) loadClips(0); }, 10000);
      }
    };
    ws.onerror = () => {}; // onclose will fire after this
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.event === 'new_clip') {
          if (!clips.find(c => c.id === msg.data.id)) {
            clips.unshift(msg.data);
            render();
            toast('New clip received!');
          }
        } else if (msg.event === 'clip_updated') {
          const idx = clips.findIndex(c => c.id === msg.data.id);
          if (idx >= 0) { clips[idx] = msg.data; render(); }
        } else if (msg.event === 'clip_deleted') {
          clips = clips.filter(c => c.id !== msg.data.id);
          render();
        } else if (msg.event === 'cleared') {
          clips = [];
          render();
        }
      } catch {}
    };
  }

  function scheduleReconnect() {
    setTimeout(connectWS, wsRetryDelay);
    wsRetryDelay = Math.min(wsRetryDelay * 1.5, 30000); // Cap at 30s
  }

  // ---- Staging area for files ----
  let stagedFiles = []; // Array of File objects

  function stageFiles(input) {
    for (const f of input.files) {
      stagedFiles.push(f);
    }
    input.value = '';
    renderStaged();
  }

  function removeStagedFile(idx) {
    stagedFiles.splice(idx, 1);
    renderStaged();
  }

  function renderStaged() {
    const container = document.getElementById('stagedFiles');
    const countEl = document.getElementById('stagedCount');
    countEl.textContent = stagedFiles.length > 0 ? ` (${stagedFiles.length})` : '';

    if (stagedFiles.length === 0) {
      container.innerHTML = '';
      return;
    }

    container.innerHTML = stagedFiles.map((f, i) => {
      const isImg = /\.(jpg|jpeg|png|gif|webp|bmp|svg)$/i.test(f.name) || f.type.startsWith('image/');
      const thumb = isImg
        ? `<img src="${URL.createObjectURL(f)}" alt="${esc(f.name)}">`
        : `<div class="sf-name" style="padding:20px 6px;">${esc(f.name)}</div>`;
      return `<div class="staged-file">
        ${thumb}
        <div class="sf-name">${esc(f.name)}</div>
        <button class="sf-remove" onclick="removeStagedFile(${i})">&times;</button>
      </div>`;
    }).join('');
  }

  // ---- Actions ----
  async function sendComposite() {
    const input = document.getElementById('clipInput');
    const labelInput = document.getElementById('clipLabel');
    const text = input.value.trim();

    if (!text && stagedFiles.length === 0) return;

    const form = new FormData();
    if (text) form.append('text', text);
    if (labelInput.value.trim()) form.append('label', labelInput.value.trim());
    for (const f of stagedFiles) {
      form.append('files', f);
    }

    await fetch(`${API}/api/composite?token=${TOKEN}`, {
      method: 'POST',
      headers: { 'x-token': TOKEN, 'x-device': DEVICE },
      body: form,
    });

    input.value = '';
    labelInput.value = '';
    stagedFiles = [];
    renderStaged();
    input.focus();
  }

  // Edit label inline
  function editLabel(id) {
    const clip = clips.find(c => c.id === id);
    if (!clip) return;
    const el = document.getElementById(`label-${id}`);
    if (!el) return;
    const currentLabel = clip.label || '';
    el.outerHTML = `<input class="clip-label-input" id="label-edit-${id}" value="${esc(currentLabel)}"
      onblur="saveLabel('${id}')" onkeydown="if(event.key==='Enter'){event.preventDefault();saveLabel('${id}');}if(event.key==='Escape'){render();}" autofocus>`;
    const inp = document.getElementById(`label-edit-${id}`);
    if (inp) { inp.focus(); inp.select(); }
  }

  async function saveLabel(id) {
    const inp = document.getElementById(`label-edit-${id}`);
    if (!inp) return;
    const newLabel = inp.value.trim();
    const clip = clips.find(c => c.id === id);
    if (!clip) return;
    clip.label = newLabel;
    render();
    await fetch(`${API}/api/clipboard/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-token': TOKEN },
      body: JSON.stringify({ label: newLabel }),
    });
  }

  async function copyClip(id) {
    const clip = clips.find(c => c.id === id);
    if (!clip) return;

    if (clip.type === 'composite') {
      // Copy text content for composite
      await navigator.clipboard.writeText(clip.content || '');
      toast('Text copied!');
    } else if (clip.type === 'image' || clip.type === 'video' || clip.type === 'file') {
      const url = `${API}${clip.content}?token=${TOKEN}`;
      await navigator.clipboard.writeText(url);
      toast('Download link copied!');
    } else {
      await navigator.clipboard.writeText(clip.content);
      toast('Copied!');
    }
  }

  async function downloadClip(id) {
    const clip = clips.find(c => c.id === id);
    if (!clip || !clip.content.startsWith('/uploads/')) return;
    const a = document.createElement('a');
    a.href = `${API}${clip.content}?token=${TOKEN}`;
    a.download = clip.originalName || 'download';
    a.click();
  }

  async function deleteClip(id) {
    await fetch(`${API}/api/clipboard/${id}`, {
      method: 'DELETE',
      headers: { 'x-token': TOKEN },
    });
  }

  async function clearAll() {
    if (!confirm('Clear all clips?')) return;
    await fetch(`${API}/api/clipboard`, {
      method: 'DELETE',
      headers: { 'x-token': TOKEN },
    });
  }

  function logout() {
    TOKEN = '';
    localStorage.removeItem('clipshare_token');
    document.getElementById('app').classList.remove('visible');
    document.getElementById('loginScreen').style.display = 'flex';
  }

  // ---- Paste handler (Ctrl+V anywhere) ----
  document.addEventListener('paste', async (e) => {
    if (!TOKEN) return;
    const textarea = document.getElementById('clipInput');

    // If pasting files (images from clipboard) → stage them, don't send
    if (e.clipboardData.files.length > 0) {
      e.preventDefault();
      for (const file of e.clipboardData.files) {
        stagedFiles.push(file);
      }
      renderStaged();
      toast('File attached — click Send when ready');
      textarea.focus();
      return;
    }

    // Let textarea handle text paste naturally
  });

  // Ctrl+Enter to send
  document.getElementById('clipInput').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); sendComposite(); }
  });

  // ---- Render ----
  function render() {
    const container = document.getElementById('clips');
    const empty = document.getElementById('emptyState');

    if (clips.length === 0) {
      container.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    container.innerHTML = clips.map(c => {
      const time = new Date(c.timestamp).toLocaleTimeString();
      const date = new Date(c.timestamp).toLocaleDateString();
      let contentHtml = '';
      let attachHtml = '';

      if (c.type === 'composite') {
        // Text part
        if (c.content) {
          // Check if text contains URLs — render them as links
          const lines = c.content.split('\n').map(line => {
            try {
              const url = new URL(line.trim());
              if (url.protocol.startsWith('http')) {
                return `<a href="${esc(line.trim())}" target="_blank" rel="noopener">${esc(line.trim())}</a>`;
              }
            } catch {}
            return esc(line);
          });
          contentHtml = `<div style="line-height:1.6">${lines.join('<br>')}</div>`;
        }
        // Attachments
        if (c.attachments && c.attachments.length > 0) {
          attachHtml = `<div class="clip-attachments">${c.attachments.map(att => {
            if (att.type === 'image') {
              return `<a href="${API}${att.path}?token=${TOKEN}" target="_blank"><img src="${API}${att.path}?token=${TOKEN}" alt="${esc(att.originalName)}" loading="lazy"></a>`;
            } else if (att.type === 'video') {
              return `<video controls src="${API}${att.path}?token=${TOKEN}"></video>`;
            } else {
              return `<div class="att-file">&#128206; <a href="${API}${att.path}?token=${TOKEN}" download="${esc(att.originalName)}">${esc(att.originalName)}</a> <span style="color:var(--dim);font-size:0.75rem">${formatSize(att.size)}</span></div>`;
            }
          }).join('')}</div>`;
        }
      } else if (c.type === 'url') {
        contentHtml = `<a href="${esc(c.content)}" target="_blank" rel="noopener">${esc(c.content)}</a>`;
      } else if (c.type === 'image') {
        contentHtml = `<img src="${API}${c.content}?token=${TOKEN}" alt="${esc(c.originalName || 'image')}" loading="lazy">`;
      } else if (c.type === 'video') {
        contentHtml = `<video controls src="${API}${c.content}?token=${TOKEN}"></video>`;
      } else if (c.type === 'file') {
        const sizeStr = c.size ? formatSize(c.size) : '';
        contentHtml = `&#128206; <a href="${API}${c.content}?token=${TOKEN}" download="${esc(c.originalName || 'file')}">${esc(c.originalName || 'File')}</a> ${sizeStr}`;
      } else {
        contentHtml = `<pre>${esc(c.content)}</pre>`;
      }

      const isFile = ['image', 'video', 'file'].includes(c.type);
      const hasAttachments = c.type === 'composite' && c.attachments?.length > 0;

      const hasLabel = c.label && c.label !== c.content?.slice?.(0, 60);
      const labelHtml = hasLabel
        ? `<span class="clip-label-text" id="label-${c.id}" onclick="editLabel('${c.id}')" title="Click to edit label">${esc(c.label)}</span>`
        : `<span class="clip-label-text empty" id="label-${c.id}" onclick="editLabel('${c.id}')" title="Click to add label">+ add label</span>`;

      return `
        <div class="clip">
          <div class="clip-header">
            <span class="clip-type ${c.type}">${c.type === 'composite' ? 'BUNDLE' : c.type}</span>
            <span>${c.from}</span>
            <span>•</span>
            <span>${date} ${time}</span>
          </div>
          <div class="clip-label">${labelHtml}</div>
          <div class="clip-content">${contentHtml}</div>
          ${attachHtml}
          <div class="clip-actions">
            <button class="clip-btn" onclick="copyClip('${c.id}')" title="Copy">&#128203; Copy</button>
            ${isFile || hasAttachments ? `<button class="clip-btn" onclick="downloadClip('${c.id}')" title="Download">&#11015; Download</button>` : ''}
            <button class="clip-btn del" onclick="deleteClip('${c.id}')" title="Delete">&#128465;</button>
          </div>
        </div>
      `;
    }).join('');
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1024/1024).toFixed(1) + ' MB';
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ---- Init ----
  (async () => {
    if (TOKEN) {
      // Validate existing token
      try {
        const res = await fetch(`${API}/api/clipboard`, { headers: { 'x-token': TOKEN } });
        if (res.ok) return showApp();
        // Token invalid — clear and show login
        if (res.status === 401) {
          TOKEN = '';
          localStorage.removeItem('clipshare_token');
        }
      } catch (e) {
        // Network error — still try to show app, loadClips will retry
        console.warn('[ClipShare] Init fetch failed, will retry:', e.message);
        return showApp();
      }
    }
    // Show login
    document.getElementById('loginScreen').style.display = 'flex';
  })();
</script>
</body>
</html>
